name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggers from the GitHub Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug.keystore.base64 found. Gradle will generate a default one."
          fi

      - name: Create local.properties & Environment files
        run: |
          # Create a mock/empty .env file if secrets plugin depends on it
          if [ ! -f ".env" ]; then
            if [ -f ".env.example" ]; then
              cp .env.example .env
            else
              touch .env
            fi
          fi

      - name: Force Regenerate Gradle Wrapper
        run: |
          echo "Force-regenerating Gradle Wrapper to resolve corruption or checksum mismatch..."
          # Overwrite any corrupt or custom wrapper jar with a clean official one
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-app-debug-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 7
