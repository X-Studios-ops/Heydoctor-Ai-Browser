name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Force Regenerate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew

      - name: Build Debug APK (Unsigned)
        run: ./gradlew :app:assembleDebug

      - name: Sign APK (Zipalign & Apksigner)
        run: |
          # Find the compiled unsigned APK
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "Found APK: $APK_PATH"
          
          # Generate a temporary digital signature (Keystore)
          keytool -genkey -v -keystore temp.keystore -alias mykey -keyalg RSA -keysize 2048 -validity 10000 -storepass "password123" -keypass "password123" -dname "CN=Heydoctor, OU=App, O=Studio, L=Ranchi, ST=Jharkhand, C=IN"
          
          # Get Android SDK Build Tools directory
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          
          # Zipalign the APK (Crucial for modern Android installation)
          $BUILD_TOOLS_DIR/zipalign -v -p 4 $APK_PATH aligned.apk
          
          # Sign the APK with the generated signature
          $BUILD_TOOLS_DIR/apksigner sign --ks temp.keystore --ks-pass pass:password123 --key-pass pass:password123 --in aligned.apk --out Heydoctor-Ready-To-Install.apk

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Heydoctor-Signed-APK
          path: Heydoctor-Ready-To-Install.apk
          if-no-files-found: error
          retention-days: 7
